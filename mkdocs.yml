site_name: Smallest Enigma Emulator Tech Specs
site_description: Technical Specifications and Record Attempt for the Smallest Enigma M4 Emulator
site_author: Denis Maggiorotto

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Record Specification: RECORD_SPECIFICATION.md
  # - Record Attempt: RECORD_ATTEMPT.md
  # - Witness Statements:
  #     - Witness 1: WITNESS_1_STATEMENT_TEMPLATE.md
  #     - Witness 2: WITNESS_2_STATEMENT_TEMPLATE.md

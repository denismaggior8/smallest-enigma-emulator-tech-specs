name: deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install -r requirements.txt
      - name: Build docs directory
        run: |
          mkdir docs
          # Create symlinks or copy files so mkdocs sees them in docs/
          cp README.md docs/index.md
          cp RECORD_ATTEMPT.md docs/
          cp RECORD_SPECIFICATION.md docs/
          cp WITNESS_1_STATEMENT_TEMPLATE.md docs/
          cp WITNESS_2_STATEMENT_TEMPLATE.md docs/
          cp -r img docs/
          cp -r tests docs/
      - run: mkdocs gh-deploy --force
